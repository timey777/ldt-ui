name: Build LDT

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest


    runs-on: ${{ matrix.os }}


    steps:

    # 拉取代码
    - name: Checkout
      uses: actions/checkout@v4


    # Linux安装依赖
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y \
          cmake \
          ninja-build \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxi-dev


    # CMake配置
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release


    # 编译
    - name: Build
      run: cmake --build build --config Release


    # 测试
    - name: Test
      run: ctest --test-dir build -C Release --output-on-failure
