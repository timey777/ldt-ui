name: Build Android


on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main



jobs:

  android-build:


    runs-on: ubuntu-latest


    steps:


    - name: Checkout
      uses: actions/checkout@v4



    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17



    - name: Setup Android SDK
      uses: android-actions/setup-android@v3



    - name: Build APK
      working-directory: android_example
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug



    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ldt-debug-apk
        path: android_example/app/build/outputs/apk/debug/*.apk
